[pool.import_all]
handler = import_all_pools
description = Importe tous les pools disponibles (zpool import -af -N)

[pool.status]
handler = get_pool_status
description = Récupère le statut des pools (zpool status)

[dataset.list]
handler = list_datasets
description = Liste les datasets d'un pool (zfs list)

[dataset.probe]
handler = probe_dataset
description = Inspecte un dataset pour déterminer son rôle

[detection.partitions]
handler = detect_partitions
description = Détecte les partitions sur les disques (lsblk)

[scheduler.shutdown]
handler = shutdown_scheduler
description = Arrête proprement le scheduler (cage, locks, etc.)
