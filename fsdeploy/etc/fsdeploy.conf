# =============================================================================
# fsdeploy.conf — Configuration principale
# =============================================================================
#
# Fichier partagé entre les trois contextes d'exécution :
#   - Debian Live (déploiement initial)
#   - Initramfs (démarrage réseau/stream sans rootfs)
#   - Système booté (gestion courante)
#
# Persisté dans boot_pool, typiquement :
#   /boot/fsdeploy/fsdeploy.conf
#
# Format : INI (configobj) — sections hiérarchiques, validation par configspec.
# Les commentaires sont préservés par configobj.
#
# Permissions : chmod 640, chown :fsdeploy (youtube_key sensible)
# =============================================================================


# ── Environnement ────────────────────────────────────────────────────────────
[env]
    # Mode détecté au runtime : deploy (live), booted, initramfs
    mode = deploy
    # Flags globaux (surchargeables via CLI)
    verbose = false
    debug = false
    dry_run = false
    quiet = false
    bypass = false
    # Métadonnées
    created_at =
    last_modified =
    last_modified_by =
    fsdeploy_version = 0.1.0


# ── Pools ZFS ────────────────────────────────────────────────────────────────
[pool]
    # Noms des pools — détectés ou saisis par l'utilisateur
    boot_pool = boot_pool
    fast_pool = fast_pool
    data_pool = data_pool
    # Point de montage effectif de boot_pool (rempli au runtime)
    boot_mount =


# ── Partitions ───────────────────────────────────────────────────────────────
[partition]
    # Rempli par PartitionDetector
    efi_device =
    efi_mount =
    # Disques détectés (par pyudev)
    disks =


# ── Détection des datasets ───────────────────────────────────────────────────
[detection]
    # none | partial | complete
    status = none
    # JSON sérialisé du rapport complet (persistance inter-sessions)
    report_json =
    # Timestamp dernière détection
    detected_at =


# ── Montages configurés ─────────────────────────────────────────────────────
# Section libre : dataset = point_de_montage
# Exemple :
#   fast_pool/rootfs-gentoo = /mnt/rootfs
#   boot_pool/boot = /mnt/boot
[mounts]


# ── Kernel actif ─────────────────────────────────────────────────────────────
[kernel]
    # Chemin relatif à boot_mount (ex: vmlinuz-6.12.0)
    active =
    version =
    # found | compiled | external
    source = found
    # Chemin absolu ou relatif des modules
    modules_path =
    # found | compiled | external
    modules_source = found


# ── Initramfs ───────────────────────────────────────────────────────────────
[initramfs]
    # Chemin relatif à boot_mount
    active =
    # zbm | minimal | stream | custom
    type = zbm
    # Méthode de construction : dracut | cpio
    method = dracut
    # Drivers dracut à inclure
    dracut_drivers = zfs, squashfs, overlay, e1000e, loop
    # Modules dracut
    dracut_modules = kernel-modules, base
    # Modules dracut à exclure
    dracut_omit = nfs, iscsi, multipath, systemd
    # Compression : zstd | xz | gzip | lz4
    compress = zstd


# ── Overlay (SquashFS + ZFS upper) ──────────────────────────────────────────
# Un seul dataset ZFS par système comme couche rw au-dessus du squashfs
[overlay]
    # Dataset ZFS utilisé comme upper (ex: fast_pool/overlay-system)
    dataset =
    # Pool contenant le dataset overlay
    pool = fast_pool
    # Chemin du squashfs rootfs (relatif à boot_mount)
    rootfs_sfs = images/rootfs.sfs
    # Chemin du squashfs Python (relatif à boot_mount, pour mode stream)
    python_sfs = images/python.sfs


# ── ZFSBootMenu ─────────────────────────────────────────────────────────────
[zbm]
    # Chemin EFI relatif à la partition EFI
    efi_path = EFI/ZBM/vmlinuz.EFI
    # Ligne de commande kernel pour ZBM
    cmdline = quiet loglevel=3 zbm.autosize=0
    # Timeout du menu ZBM en secondes
    timeout = 3
    # Dataset racine présenté par ZBM
    bootfs =


# ── Presets de boot ─────────────────────────────────────────────────────────
# Le preset actif est un nom de sous-section dans [[entries]]
# Chaque preset définit un ensemble kernel+initramfs+rootfs+overlay complet
[presets]
    active =

    # Exemple de preset (décommenter et adapter) :
    # [[default]]
    #     kernel = vmlinuz-6.12.0
    #     initramfs = initramfs-6.12.0.img
    #     modules = modules-6.12.0.sfs
    #     rootfs = images/rootfs.sfs
    #     python_sfs = images/python.sfs
    #     overlay_dataset = fast_pool/overlay-system
    #     init_type = zbm
    #     pools = boot_pool, fast_pool
    #     datasets =
    #     boot_path = /boot
    #     kernel_version = 6.12.0
    #     rebuild_initramfs = false
    #     compress = zstd

    # [[stream]]
    #     kernel = vmlinuz-6.12.0
    #     initramfs = initramfs-stream.img
    #     init_type = stream
    #     pools = boot_pool
    #     overlay_dataset =
    #     rebuild_initramfs = false


# ── Stream YouTube ──────────────────────────────────────────────────────────
[stream]
    enabled = false
    # Clé de stream YouTube — SENSIBLE, protégé par chmod 640
    youtube_key =
    resolution = 1920x1080
    fps = 30
    bitrate = 4500k
    audio_bitrate = 128k
    # Délai en secondes avant démarrage du stream après boot
    start_delay = 30
    # Source vidéo (framebuffer par défaut)
    input = /dev/fb0
    # Module Python embarqué dans l'initramfs pour le stream
    stream_module =


# ── Réseau ──────────────────────────────────────────────────────────────────
[network]
    # Interface à configurer (vide = auto-détection)
    interface =
    # dhcp | static
    method = dhcp
    # Pour method = static :
    ip_address =
    gateway =
    dns =
    # Timeout DHCP en secondes
    timeout = 30


# ── Snapshots ───────────────────────────────────────────────────────────────
[snapshots]
    # Répertoire de base pour les exports
    base_dir =
    # Rétention en jours
    retention_days = 30
    # Compresser les exports (zstd)
    compress = true
    # Datasets à snapshoter automatiquement (séparés par virgules)
    auto_datasets =
    # Intervalle auto-snapshot en secondes (0 = désactivé)
    auto_interval = 0


# ── Sécurité — règles par chemin ────────────────────────────────────────────
# Chaque clé correspond au security_path du décorateur @security.xxx.yyy
# Valeurs : true | false | deny
# Les options require_confirm sont gérées par la TUI, pas ici.
[security]
    # Exemples (décommenter pour restreindre) :
    # dataset.destroy = deny
    # pool.export_pool = false
    # snapshot.rollback = true


# ── Scheduler / Daemon ──────────────────────────────────────────────────────
[scheduler]
    # Intervalle du cycle principal en secondes
    tick_interval = 0.1
    # Nombre de workers pour les tasks threaded
    max_workers = 4
    # Activer le bus udev (détection ajout/retrait disques)
    bus_udev = true
    # Activer le bus inotify (surveillance /boot)
    bus_inotify = true
    # Activer la socket Unix (contrôle CLI externe)
    bus_socket = true
    # Chemin de la socket Unix
    socket_path = /run/fsdeploy.sock
    # Jobs périodiques
    [[timer_jobs]]
        # coherence_check toutes les heures (3600s)
        coherence_check = 3600
        # scrub hebdomadaire (604800s)
        scrub_check = 604800
        # auto-snapshot (0 = utiliser snapshots.auto_interval)
        snapshot_auto = 0


# ── TUI ─────────────────────────────────────────────────────────────────────
[tui]
    # Activer la TUI au démarrage (false = mode bare/daemon)
    enabled = true
    # Port pour textual-web (0 = désactivé, terminal uniquement)
    web_port = 0
    # Thème Textual
    theme = dark
    # Restart auto de la TUI si elle crash
    auto_restart = true
    # Backoff max en secondes entre les restarts
    max_backoff = 60


# ── Logging ─────────────────────────────────────────────────────────────────
[log]
    # debug | info | warning | error
    level = info
    # Répertoire des logs (vide = auto : $INSTALL_DIR/var/log/fsdeploy/)
    dir =
    # Taille max des logs en MB avant rotation
    max_size_mb = 50
    # Format : text | json (json = structlog JSON, text = structlog console)
    format = text
    # Fallback ASCII si TERM=linux (framebuffer)
    ascii_fallback = true


# ── Intégrité ───────────────────────────────────────────────────────────────
[integrity]
    # Activer la vérification d'intégrité automatique
    enabled = true
    # Algorithme par défaut : crc32 | sha256 | blake2b | auto
    # auto = CRC32 < 1MB, SHA256 1-50MB, BLAKE2B > 50MB
    algorithm = auto
    # Vérifier l'intégrité avant chaque boot
    verify_on_boot = true


# ── Meta (géré automatiquement par FsDeployConfig) ──────────────────────────
[meta]
    config_version = 1
    created_at =
    last_saved =
    last_saved_by =
