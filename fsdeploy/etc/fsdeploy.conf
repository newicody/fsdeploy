# =============================================================================
# fsdeploy.conf -- Configuration principale
# =============================================================================
#
# Fichier partage entre les trois contextes d'execution :
#   - Debian Live (deploiement initial)
#   - Initramfs (demarrage reseau/stream sans rootfs)
#   - Systeme boote (gestion courante)
#
# Persiste dans boot_pool, typiquement :
#   <boot_pool_mount>/fsdeploy/fsdeploy.conf
#
# Format : INI (configobj) -- sections hierarchiques, validation par configspec.
# Les commentaires sont preserves par configobj.
#
# Permissions : chmod 640, chown :fsdeploy (youtube_key sensible)
#
# PRINCIPE : ZERO chemin en dur. Toutes les valeurs sont vides par defaut.
# Les chemins concrets sont remplis lors de la detection ou par l'utilisateur.
# =============================================================================


# -- Environnement ------------------------------------------------------------
[env]
    # Mode detecte au runtime : deploy (live), booted, initramfs
    mode = deploy
    # Flags globaux (surchargeables via CLI)
    verbose = false
    debug = false
    dry_run = false
    quiet = false
    bypass = false
    # Metadonnees
    created_at =
    last_modified =
    last_modified_by =
    fsdeploy_version = 0.1.0


# -- Pools ZFS ----------------------------------------------------------------
# Noms detectes au runtime, jamais hardcodes
[pool]
    boot_pool =
    fast_pool =
    data_pool =
    # Point de montage effectif de boot_pool (rempli au runtime)
    boot_mount =


# -- Partitions ----------------------------------------------------------------
[partition]
    # Rempli par PartitionDetector
    efi_device =
    efi_mount =
    # Numero de partition EFI (pour efibootmgr -p)
    efi_part_num =
    # Disques detectes (par pyudev)
    disks =


# -- Detection des datasets ---------------------------------------------------
[detection]
    # none | partial | complete
    status = none
    # JSON serialise du rapport complet (persistance inter-sessions)
    report_json =
    # Timestamp derniere detection
    detected_at =


# -- Montages configures ------------------------------------------------------
# Section libre : dataset = point_de_montage
# Exemple :
#   fast_pool/rootfs-gentoo = /mnt/rootfs
#   boot_pool/boot = /mnt/boot
[mounts]


# -- Kernel actif + provisionnement -------------------------------------------
[kernel]
    # Chemin relatif a staging_dir (ex: vmlinuz-6.12.0)
    active =
    version =
    # found | compiled | external
    source = found
    # Chemin absolu ou relatif des modules
    modules_path =
    modules_source = found
    # Repertoire cible ou les kernels choisis sont provisiones
    # Vide = utilise pool.boot_mount
    staging_dir =
    # Methode : symlink (meme pool), copy (cross-pool), bind (temporaire)
    install_method = symlink
    # Datasets dans lesquels chercher les kernels (vide = tous les detectes)
    # Exemple : boot_pool/boot, boot_pool/images
    search_datasets =
    # Patterns glob supplementaires pour trouver des kernels
    extra_patterns =
    # Prefixes reconnus pour les fichiers kernel
    prefixes = vmlinuz-, vmlinux-, bzImage-
    # Prefixes reconnus pour les fichiers initramfs
    initramfs_prefixes = initramfs-, initrd.img-, initrd-


# -- Initramfs ----------------------------------------------------------------
[initramfs]
    # Chemin relatif a boot_mount / staging_dir
    active =
    # zbm | minimal | stream | custom
    type = zbm
    # Methode de construction : dracut | cpio
    method = dracut
    # Drivers dracut a inclure
    dracut_drivers = zfs, squashfs, overlay, e1000e, loop
    # Modules dracut
    dracut_modules = kernel-modules, base
    # Modules dracut a exclure
    dracut_omit = nfs, iscsi, multipath, systemd
    # Compression : zstd | xz | gzip | lz4
    compress = zstd


# -- Overlay (SquashFS + ZFS upper) -------------------------------------------
[overlay]
    # Dataset ZFS utilise comme upper (ex: fast_pool/overlay-system)
    dataset =
    # Pool contenant le dataset overlay
    pool =
    # Chemin du squashfs rootfs (relatif a boot_mount)
    rootfs_sfs =
    # Chemin du squashfs Python (relatif a boot_mount, pour mode stream)
    python_sfs =


# -- ZFSBootMenu ---------------------------------------------------------------
[zbm]
    # Chemin EFI relatif a la partition EFI (ex: EFI/ZBM/vmlinuz.EFI)
    efi_path =
    # Backup EFI (ex: EFI/ZBM/vmlinuz-backup.EFI)
    backup_efi_path =
    # Ligne de commande kernel pour ZBM
    cmdline = quiet loglevel=3 zbm.autosize=0
    # Timeout du menu ZBM en secondes
    timeout = 3
    # Dataset racine prefere (zbm.prefer=...)
    bootfs =
    # Methode d'installation : prebuilt | generate | manual
    install_method = prebuilt
    # URL de telechargement EFI prebuilt
    prebuilt_url = https://get.zfsbootmenu.org/efi
    # Chemin config.yaml pour generate-zbm (vide = genere par fsdeploy)
    config_yaml =
    # Repertoire images ZBM (Components.ImageDir)
    image_dir =
    # Nombre de versions a conserver
    versions = 3
    # Repertoire de configuration dracut specifique ZBM
    dracut_conf_dir =


# -- Presets de boot -----------------------------------------------------------
# Le preset actif est un nom de sous-section dans [[entries]]
# Chaque preset definit un ensemble kernel+initramfs+rootfs+overlay complet
[presets]
    active =

    # Exemple de preset (decommenter et adapter) :
    # [[default]]
    #     kernel = vmlinuz-6.12.0
    #     initramfs = initramfs-6.12.0.img
    #     modules = modules-6.12.0.sfs
    #     rootfs = images/rootfs.sfs
    #     python_sfs = images/python.sfs
    #     overlay_dataset = fast_pool/overlay-system
    #     init_type = zbm
    #     pools = boot_pool, fast_pool
    #     datasets =
    #     kernel_version = 6.12.0
    #     rebuild_initramfs = false
    #     compress = zstd

    # [[stream]]
    #     kernel = vmlinuz-6.12.0
    #     initramfs = initramfs-stream.img
    #     init_type = stream
    #     pools = boot_pool
    #     overlay_dataset =
    #     rebuild_initramfs = false


# -- Stream YouTube ------------------------------------------------------------
[stream]
    enabled = false
    # Cle de stream YouTube -- SENSIBLE, protege par chmod 640
    youtube_key =
    resolution = 1920x1080
    fps = 30
    bitrate = 4500k
    audio_bitrate = 128k
    # Delai en secondes avant demarrage du stream apres boot
    start_delay = 30
    # Source video (framebuffer par defaut)
    input = /dev/fb0
    # Module Python embarque dans l'initramfs pour le stream
    stream_module =


# -- Reseau -------------------------------------------------------------------
[network]
    # Interface a configurer (vide = auto-detection)
    interface =
    # dhcp | static
    method = dhcp
    # Pour method = static :
    ip_address =
    gateway =
    dns =
    # Timeout DHCP en secondes
    timeout = 30


# -- Snapshots ----------------------------------------------------------------
[snapshots]
    # Repertoire de base pour les exports
    base_dir =
    # Retention en jours
    retention_days = 30
    # Compresser les exports (zstd)
    compress = true
    # Datasets a snapshoter automatiquement (separes par virgules)
    auto_datasets =
    # Intervalle auto-snapshot en secondes (0 = desactive)
    auto_interval = 0


# -- Securite -- regles par chemin --------------------------------------------
# Chaque cle correspond au security_path du decorateur @security.xxx.yyy
# Valeurs : true | false | deny
[security]


# -- Scheduler ----------------------------------------------------------------
[scheduler]
    tick_interval = 0.1
    max_workers = 4
    bus_udev = true
    bus_inotify = true
    bus_socket = true
    # Socket path (vide = auto-detection $XDG_RUNTIME_DIR ou fallback)
    socket_path =
    [[timer_jobs]]
    coherence_check = 3600
    scrub_check = 604800
    snapshot_auto = 0


# -- TUI -----------------------------------------------------------------------
[tui]
    enabled = true
    web_port = 0
    theme = dark
    auto_restart = true
    max_backoff = 60


# -- Logging -------------------------------------------------------------------
[log]
    level = info
    dir =
    max_size_mb = 50
    format = text
    ascii_fallback = true


# -- Integrite -----------------------------------------------------------------
[integrity]
    enabled = true
    algorithm = auto
    verify_on_boot = true


# -- Meta (gere automatiquement) -----------------------------------------------
[meta]
    config_version = 1
    created_at =
    last_saved =
    last_saved_by =
